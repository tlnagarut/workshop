about:
  eyebrow: About
  title: Hello, I'm Tomas.
  p1: >
    I'm a woodworker based in Haifa. I make furniture and fitted joinery the
    slow way — solid timber, honest joinery and finishes that age well rather
    than wear out.
  p2: >
    Every piece starts with a conversation and a sketch. Whether it's a single
    dining table for your home or a full fit-out for your business, you deal
    with me directly from first idea to final installation.
  p3: >
    I built serious experience over years working in the UK, on demanding
    residential and commercial projects — and I bring that standard of
    craftsmanship to every piece I make in Haifa.
  stat1Value: 12+
  stat1Label: years at the bench
  stat2Value: 100%
  stat2Label: made to order
  stat3Value: Haifa
  stat3Label: workshop & delivery

