  businessTitle: ללקוחות עסקיים
  businessBody: >
    עיצוב פנים לבתי קפה ומסעדות, דלפקי קבלה, שולחנות ישיבות, תצוגות לחנויות וסדרות רהיטים בהזמנה — מסופקים בזמן.
  restoreTitle: תיקון ושיקום
  restoreBody: >
    החזרת רהיטים ישנים או מורשת לחיים — תיקונים, חידוש גימור והתאמות עדינות.

