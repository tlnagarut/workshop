# Builds the projects data from assets/projects/ and deploys to GitHub Pages.
# After this runs once, adding a project = push a folder with photos + project.md.
name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let only one deploy run at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4

      # Regenerate static assets
      - run: node tools/build-content.mjs
      - run: node tools/build-workshop.mjs
      - run: node tools/build-projects.mjs

      # Stamp cache-busting ?v=<hash> so the deployed HTML matches the freshly
      # built assets, even if the committed HTML wasn't re-stamped locally.
      - run: node tools/stamp-versions.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deploy
        uses: actions/deploy-pages@v4
