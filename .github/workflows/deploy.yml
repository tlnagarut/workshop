# Builds the projects data from assets/projects/ and deploys to GitHub Pages.
# After this runs once, adding a project = push a folder with photos + project.md.
name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let only one deploy run at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Regenerate assets/js/projects-data.js from the project folders.
      - run: node tools/build-projects.mjs

      # Regenerate assets/js/i18n.js from content/*.yml.
      - run: node tools/build-i18n.mjs

      # Regenerate assets/workshop/workshop.js from content/workshop*.yml.
      - run: node tools/build-workshop.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deploy
        uses: actions/deploy-pages@v4
