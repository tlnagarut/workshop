<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="workshop.metaTitle">Workshop — TL Nagarut</title>
    <meta name="description" data-i18n="meta.description" data-i18n-attr="content"
      content="Handcrafted furniture and custom woodwork in Haifa, Israel." />

    <link rel="icon" href="assets/img/og-image.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&family=Heebo:wght@400;500;700&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="assets/css/styles.css?v=2" />
  </head>
  <body>
    <!-- ===================== Header / nav ===================== -->
    <header class="site-header" id="top">
      <div class="container nav">
        <a class="brand" href="index.html" data-i18n="nav.brand">TL Nagarut</a>

        <nav class="nav-links" id="nav-links" aria-label="Primary">
          <a href="index.html#about" data-i18n="nav.about">About</a>
          <a href="index.html#services" data-i18n="nav.services">Services</a>
          <a href="index.html#contact" data-i18n="nav.contact">Contact</a>
          <a href="workshop.html" data-i18n="nav.workshop" aria-current="page">Workshop</a>
          <a href="projects.html" data-i18n="nav.projects">Projects</a>
        </nav>

        <button id="nav-toggle" class="nav-toggle" type="button"
          aria-expanded="false" aria-controls="nav-links"
          data-i18n-aria="nav.menuAria" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>

        <button id="lang-toggle" class="lang-toggle" type="button"
          data-i18n="nav.langToggle" data-i18n-aria="nav.langToggleAria"
          aria-label="Switch to Hebrew">עברית</button>
      </div>
    </header>

    <main>
      <!-- ===================== Workshop ===================== -->
      <!-- Content for this section is in assets/workshop/workshop.js -->
      <section class="section" id="workshop">
        <div class="container">
          <p class="eyebrow" id="ws-eyebrow"></p>
          <h2 id="ws-title"></h2>
          <p class="lede" id="ws-intro"></p>
          <div class="cards" id="ws-features"><!-- rendered by JS --></div>
          <div class="workshop-photos" id="ws-photos"><!-- rendered by JS --></div>
        </div>
      </section>
    </main>

    <!-- ===================== Footer ===================== -->
    <footer class="site-footer">
      <div class="container footer-inner">
        <span><span id="footer-name">Tomas Janulionis</span> · <span data-i18n="footer.builtIn">Handmade in Haifa.</span></span>
        <span>© <span id="year"></span> · <span data-i18n="footer.rights">All rights reserved.</span></span>
      </div>
    </footer>

    <!-- ===================== Gallery lightbox ===================== -->
    <div class="gallery" id="gallery" hidden aria-modal="true" role="dialog">
      <button class="gallery-close" id="gallery-close" type="button" data-i18n-aria="gallery.close" aria-label="Close">×</button>
      <button class="gallery-nav gallery-prev" id="gallery-prev" type="button" data-i18n-aria="gallery.prev" aria-label="Previous photo">‹</button>
      <figure class="gallery-figure">
        <img id="gallery-img" alt="" />
        <figcaption id="gallery-caption"></figcaption>
      </figure>
      <button class="gallery-nav gallery-next" id="gallery-next" type="button" data-i18n-aria="gallery.next" aria-label="Next photo">›</button>
    </div>

    <script src="assets/js/i18n.js?v=2"></script>
    <script src="assets/workshop/workshop.js?v=2"></script>
    <script src="assets/js/main.js?v=2"></script>
  </body>
</html>
